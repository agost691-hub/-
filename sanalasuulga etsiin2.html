 const options = [ "Сэтгэл ханамж хангалттай сайн", "Сэтгэл ханамж дээгүүр", "Сэтгэл ханамжтай", "Сэтгэл ханамж доогуур", "Сэтгэл ханамжгүй", "Хариулах боломжгүй" ];
function loadQuestions(){
    let form = document.getElementById("form");

    questions.forEach((q,i)=>{
        let div = document.createElement("div");
        div.className="q";

        let html = `<b>${q}</b><br>`;

        options.forEach(opt=>{
            html += `
            <label>
                <input type="radio" name="q${i}" value="${opt}">
                ${opt}
            </label>`;
        });

        div.innerHTML = html;
        form.appendChild(div);
    });
}
function submitForm(){

    let results = [];

    for(let i=0;i<50;i++){
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        results.push(`Q${i+1}: ${selected ? selected.value : "хоосон"}`);
    }
    document.getElementById("result").innerText = results.join("\n");
    emailjs.send(
        "service_ycp9ctt",
        "template_vzv8dfa",
        {
            message: results.join("\n")
        }
    ).then(()=>{
        alert(" Email илгээгдлээ!");
    }).catch(err=>{
        console.log(err);
        alert(" Алдаа гарлаа");
    });
}

window.onload = loadQuestions;
